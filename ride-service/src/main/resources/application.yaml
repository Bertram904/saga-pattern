server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: ride-service

  sql:
    init:
      mode: always

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ride_db?currentSchema=ride}
    username: ${DB_USERNAME:ride_user}
    password: ${DB_PASSWORD:ride_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        default_schema: ride
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      group-id: ride-saga
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      concurrency: 1

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Asia/Ho_Chi_Minh
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    root: INFO
    com.tuananh.rideservice: DEBUG
    org.hibernate.SQL: DEBUG

app:
  outbox:
    # Polling publisher: reads outbox table and calls KafkaTemplate (disable when demoing CDC-only routing).
    polling-relay-enabled: true
    relay-delay-ms: 500