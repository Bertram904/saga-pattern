# Stack: Postgres (logical WAL) + Kafka + Kafka UI + Debezium Connect (CDC demo).
# App relay: polling (@Scheduled) — toggle app.outbox.polling-relay-enabled in each service.
# CDC: topics ridehailing.cdc.<schema>.outbox_messages — see docs/SOA_SII_2025_2026.md

services:
  postgres:
    image: postgres:15
    container_name: ride_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ride_user
      POSTGRES_PASSWORD: ride_password
      POSTGRES_DB: ride_db
    command: ["postgres", "-c", "wal_level=logical"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-schemas.sql
    networks:
      - ride_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ride_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ride_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ride_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - ride_network

  debezium:
    image: debezium/connect:2.5
    container_name: ride_debezium
    depends_on:
      - kafka
      - postgres
    ports:
      - "8084:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
    networks:
      - ride_network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ride_kafka_ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - ride_network

networks:
  ride_network:
    driver: bridge

volumes:
  postgres_data:
